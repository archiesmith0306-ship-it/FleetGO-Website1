services:
  - type: web
    name: fleetgo-website
    env: static
    buildCommand: pnpm install --no-frozen-lockfile && pnpm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SKIP_INSTALL_DEPS
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
